version: "3.8"

services:
  skyoffice:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:2567"
    environment:
      - PORT=2567
      - DATABASE_URL=postgresql://nexvoffice:${DB_PASSWORD:-nexvoffice_dev}@postgres:5432/nexvoffice
      - JWT_SECRET=${JWT_SECRET:-nexvoffice_dev_secret}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexvoffice
      POSTGRES_USER: nexvoffice
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nexvoffice_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexvoffice"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
